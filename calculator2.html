<html>
<head>
    <title>A simple calculator</title>
   <style>
    body{ font-family: 'Times New Roman', 'Times New Roman', Times, serif; background-color: black;}
    #container{width:320px; height:550px; background-image: url("https://static.vecteezy.com/system/resources/previews/012/168/187/large_2x/beautiful-sunset-on-the-beach-with-palm-tree-for-travel-and-vacation-free-photo.JPG"); margin:20px auto}
    #calculator{width:320px; height:520px; top:20px; position: relative; margin:0px auto; border-radius: 20px; box-shadow: 4px 4px 8px crimson;}
    .operator, .number, .empty{width:50px; height:50px; margin:10px; float:left; border-radius: 50%; font-size: bold;}
   </style>
</head> 
<body>
    <div id="container">
        <div id="calculator">
            <div id="keyboard"
            <button class="operator" id="clear">C</button>
            <button class="operator" id="backspace">CE</button>
            <button class="operator" id="%">%</button>
            <button class="operator" id="/">/</button>
            <button class="number" id="7">C</button>
            <button class="number" id="8">8</button>
            <button class="number" id="9">9</button>
            <button class="operator" id="*">*</button>
            <button class="number" id="4">4</button>
            <button class="number" id="5">5</button>
            <button class="number" id="6">C</button>
            <button class="operator" id="-">-</button>
            <button class="number" id="1">1</button>
            <button class="number" id="2">2</button>
            <button class="number" id="3">3</button>
            <button class="operator" id="+">+</button>
            <button class="operator" id="empty"></button>
            <button class="number" id="0">0</button>
            <button class="operator" id="empty"></button>
            <button class="operator" id="=">=</button>
        </div>
    </div>
</body>
</html>
