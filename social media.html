<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<!-- Bootstrap CSS -->
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" />
<!-- My CSS -->
<link rel="stylesheet" href="style.css" />
<!-- Font Awesome -->
<script src="https://kit.fontawesome.com/996973c893.js"></script>
<!-- Google Fonts -->
<link
href="https://fonts.googleapis.com/css2?family=Barlow+TT:ital,wght@0,400;0,700;0,800;0,900;1,400&display=swap"
rel="stylesheet" />
<style>/* style.css */
/* Section background like the image */
#social-media{
background: #2f3550; /* dark bluish */
}
/* Heading style */
.m-heading{
font-weight: 700;
margin-top: 6px;
}
/* Button cards */
.media_link{
border: 2px solid #f2a900; /* yellow border */
border-radius: 4px;
padding: 14px 18px;
margin-right: 18px;
background: transparent;
text-align: left;
}
/* Keep spacing like the screenshot */
.row.pt-5{
gap: 18px;
}
/* Text inside the buttons */
.media_link h3{
font-size: 16px;
font-weight: 600;
}
/* Icons */
.media_link i{
font-size: 22px;
}
/* Email button filled (already has bg-warning in HTML) */
.media_link.bg-warning{
border: 2px solid #f2a900;
}</style>
<title>Portfolio</title>
</head>
<body>
    <div id="social-media" class="container-fluid">
        <div class="container text-white py-5">
            <h4 class="text-warning">Social Media</h4>
            <h1 class="m-heading">Let's be friends</h4>
            <div class="row pt-5">
            <div class="col-3 media_link btn" href="#">
                <div class="row">
                <div class="col-6 d-flex justify-content-start">
                    <h3 class="m-0 pt-2 text-white">LinkedIn</h3> 
                </div>
                <div class="col-6 d-flex justify-content-and align-items-center">
                <i class="fab fa-linkedin-in fa-2x text-secondary"></i>
                </div>
                </div>
                </div>
                <div class="col-3 media_link btn">
                    <div class="row">
                        <div class="col-6 d-flex justify-content-start">
                            <h3 class="m-0 pt-2 text-white">Youtube</h3>
                        </div>
                            <div class="col-6 d-flex justify-content-and align-items-center">
                                <i class="fab fa-youtube fa-2x text-secondary"></i>
                            </div>
                            </div>
                            </div>
                                <div class="col-3 media_link bg-warning btn">
                                    <div class="row">
                                    <div class="col-6 d-flex justify-content-start">
                                        <h3 class="m-0 pt-2 text-dark">Email</h3>
                                    </div>
                                        <div class="col-6 d-flex justify-content-and align-items-center">
                                        <div class-="col-6 d-flex justify-content-and align-items-center">
                                        <i class="fas fa-enevelope fa-2x text-secondary"></i>
                                        </div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                </div>
                </div>
                </div>
            </div>
            </div>
        </div>
    </div>
